<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">عالم أسماء الخاص ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap');
        :root { --gold: #ffb703; --glass: rgba(0, 0, 0, 0.35); } 
        
        body { margin: 0; background-color: #000; background-size: cover; background-position: center; background-attachment: fixed; font-family: 'Cairo', sans-serif; color: #fff; text-align: center; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(1px); z-index: -1; }

        #gate { height: 100vh; display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; z-index: 9999; background-size: cover; background-position: center; transition: 1s; }
        #gate-overlay { background: var(--glass); padding: 30px; border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 380px; }
        
        #content { display: none; opacity: 0; padding: 20px; transition: 1s; }
        .grad-header { font-family: 'Amiri', serif; font-size: 2.5rem; text-shadow: 0 0 15px var(--gold); margin: 50px auto 5px; color: var(--gold); }
        .grad-intro { font-size: 1.1rem; color: #ddd; margin-bottom: 20px; }

        .glass-card { background: var(--glass); backdrop-filter: blur(12px); max-width: 800px; margin: 15px auto; border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .live-counter { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 5px; direction: ltr; }
        .counter-unit { background: rgba(255, 183, 3, 0.1); padding: 6px; border-radius: 10px; min-width: 42px; border: 1px solid rgba(255, 183, 3, 0.2); }
        .unit-num { display: block; font-size: 1rem; font-weight: bold; color: var(--gold); }
        .unit-label { font-size: 0.55rem; color: #ccc; }

        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px auto; }
        .gallery img, .gallery video { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--gold); }
        .close-lightbox { position: absolute; top: 30px; right: 30px; font-size: 50px; color: var(--gold); cursor: pointer; }

        .music-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: var(--gold); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 5000; cursor: pointer; }

        .adm-btn { width: 100%; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #fff; padding: 20px; border-radius: 20px; z-index: 10001; width: 90%; max-width: 420px; text-align: right; max-height: 90vh; overflow-y: auto; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }
        
        .manage-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; margin-bottom: 8px; }
        .manage-item img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        .del-btn { background: #ff4d6d; color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .trigger { opacity: 0.15; font-size: 10px; margin-top: 20px; cursor: pointer; display: block; }
        
        h4.sec-title { color: var(--gold); margin: 25px 0 10px; border-bottom: 1px solid rgba(255,183,3,0.3); display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="gate">
        <div id="gate-overlay">
            <h1 id="gateName" style="color:var(--gold); font-family:'Amiri';">أسماء ✨</h1>
            <input type="password" id="gatePass" placeholder="كلمة السر" style="text-align: center;">
            <button onclick="unlock()" class="adm-btn">دخول</button>
            <span class="trigger" onclick="openAdmin()">إعدادات</span>
        </div>
    </div>

    <div id="lightbox"><span class="close-lightbox" onclick="closeLightbox()">&times;</span><img id="light-img" src=""></div>
    <div class="music-btn" onclick="toggleM()" id="mBtn"><i class="fas fa-music"></i></div>

    <div id="content">
        <audio id="bgMusic" loop></audio>
        
        <div class="grad-header" id="welcome-title">عالم أسماء الخاص</div>
        <p class="grad-intro" id="welcome-intro">أنتِ كل حياتي</p>
        
        <div class="glass-card" style="padding: 10px;">
            <p style="margin: 0 0 8px; font-size: 0.9rem; color: var(--gold);">بدايه الرحلة</p>
            <div id="live-timer" class="live-counter"></div>
        </div>

        <h4 class="sec-title">عالمكِ الخاص 📸</h4>
        <div class="gallery" id="photo-gallery"></div>

        <h4 class="sec-title">لحظات لا تُنسى 📽️</h4>
        <div class="gallery" id="video-gallery"></div>

        <h4 class="sec-title">رسائل لكِ 💌</h4>
        <div id="messages-list" style="max-width: 800px; margin: 0 auto 40px;"></div>
    </div>

    <div id="admin-panel">
        <h3 style="text-align:center; color:var(--gold);">إدارة المحتوى ⚙️</h3>
        
        <div class="glass-card" style="background:rgba(255,255,255,0.03)">
            <label>الإعدادات والخلفية:</label>
            <input type="text" id="confTitle" placeholder="العنوان">
            <input type="text" id="confIntro" placeholder="رسالة التهنئة">
            <input type="text" id="confPass" placeholder="باسورد الدخول">
            <input type="date" id="confDate">
            <input type="file" id="bgFile" accept="image/*">
            <button onclick="saveSettings()" class="adm-btn">حفظ الأساسيات</button>
        </div>

        <div class="glass-card" style="background:rgba(255,255,255,0.03)">
            <label>إضافة محتوى جديد:</label>
            <input type="file" id="photoFile" accept="image/*" title="ارفع صورة">
            <input type="file" id="videoFile" accept="video/*" title="ارفع فيديو">
            <input type="file" id="musicFile" accept="audio/*" title="ارفع موسيقى">
            <textarea id="msgInp" placeholder="اكتب رسالة.."></textarea>
            <button onclick="uploadContent()" id="upBtn" class="adm-btn" style="background:#28a745; color:white;">رفع الآن</button>
        </div>

        <div id="manage-section" class="glass-card" style="background:rgba(255,255,255,0.03); max-height: 250px; overflow-y: auto;">
            <h5 style="color:var(--gold); text-align:center; margin:0 0 10px 0;">حذف العناصر</h5>
            <div id="manage-list"></div>
        </div>

        <button onclick="document.getElementById('admin-panel').style.display='none'" class="adm-btn" style="background:#444; color:#fff;">إغلاق اللوحة</button>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKBX6VE8UWECLNZXZV2-AdfXMQsTqck_I",
            authDomain: "asma-7459e.firebaseapp.com",
            projectId: "asma-7459e",
            storageBucket: "asma-7459e.firebasestorage.app",
            messagingSenderId: "827126235820",
            appId: "1:827126235820:web:ea0f8bf2531ad01e361509",
            measurementId: "G-8X7J63QPLR",
            databaseURL: "https://asma-7459e-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let settings = { title: "أسماء", intro: "أنتِ كل حياتي", date: "2026-01-01", pass: "123" };

        db.ref('appSettings').on('value', s => { 
            if(s.val()) { 
                settings = s.val(); 
                document.getElementById('welcome-title').innerText = settings.title || "أسماء"; 
                document.getElementById('welcome-intro').innerText = settings.intro || "أنتِ كل حياتي"; 
                document.getElementById('confTitle').value = settings.title || "";
                document.getElementById('confIntro').value = settings.intro || "";
                document.getElementById('confPass').value = settings.pass || "";
                document.getElementById('confDate').value = settings.date || "";
            } 
        });

        db.ref('visuals/bg').on('value', s => { if(s.val()) { document.body.style.backgroundImage = `url(${s.val()})`; document.getElementById('gate').style.backgroundImage = `url(${s.val()})`; } });
        db.ref('visuals/music').on('value', s => { if(s.val()) document.getElementById('bgMusic').src = s.val(); });

        function unlock() {
            if(document.getElementById('gatePass').value === settings.pass) {
                document.getElementById('gate').style.display = "none";
                document.getElementById('content').style.display = "block";
                document.getElementById('content').style.opacity = "1";
                document.getElementById('bgMusic').play();
                startLiveCounter(); loadData();
            } else alert("باسورد الدخول غير صحيح");
        }

        function openAdmin() { if(prompt("باسورد الإدارة:") === "1997") { document.getElementById('admin-panel').style.display = "block"; loadManagement(); } }
        function openImg(url) { document.getElementById('light-img').src = url; document.getElementById('lightbox').style.display = "flex"; }
        function closeLightbox() { document.getElementById('lightbox').style.display = "none"; }
        function toggleM() {
            const m = document.getElementById('bgMusic');
            if(m.paused) { m.play(); document.getElementById('mBtn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { m.pause(); document.getElementById('mBtn').innerHTML = '<i class="fas fa-music"></i>'; }
        }

        async function saveSettings() {
            const bgFile = document.getElementById('bgFile').files[0];
            await db.ref('appSettings').update({ title: document.getElementById('confTitle').value, intro: document.getElementById('confIntro').value, pass: document.getElementById('confPass').value, date: document.getElementById('confDate').value });
            if(bgFile) {
                const r = new FileReader(); r.readAsDataURL(bgFile);
                r.onload = async () => { await db.ref('visuals/bg').set(r.result); alert("تم الحفظ ✅"); };
            } else alert("تم الحفظ ✅");
        }

        async function uploadContent() {
            const btn = document.getElementById('upBtn'); btn.disabled = true; btn.innerText = "جاري الرفع...";
            const music = document.getElementById('musicFile').files[0];
            const photo = document.getElementById('photoFile').files[0];
            const video = document.getElementById('videoFile').files[0];
            const msg = document.getElementById('msgInp').value;

            if(msg) { await db.ref('messages').push({text: msg}); document.getElementById('msgInp').value = ""; }
            
            const readFile = (file) => new Promise((resolve) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.readAsDataURL(file); });

            if(music) { const res = await readFile(music); await db.ref('visuals/music').set(res); }
            if(photo) { const res = await readFile(photo); await db.ref('photos').push({url: res, type: 'img'}); }
            if(video) { const res = await readFile(video); await db.ref('photos').push({url: res, type: 'vid'}); }

            document.getElementById('photoFile').value = "";
            document.getElementById('videoFile').value = "";
            document.getElementById('musicFile').value = "";
            
            btn.disabled = false; btn.innerText = "رفع الآن";
            alert("تم الرفع بنجاح ✅");
            loadManagement();
        }

        function loadData() {
            db.ref('messages').on('value', s => {
                const l = document.getElementById('messages-list'); l.innerHTML = "";
                if(s.val()) Object.values(s.val()).reverse().forEach(m => {
                    l.innerHTML += `<div style="background:var(--glass); backdrop-filter:blur(10px); padding:12px; border-radius:15px; margin:10px auto; border-right:4px solid var(--gold); text-align:right; width:90%;">${m.text}</div>`;
                });
            });
            db.ref('photos').on('value', s => {
                const pg = document.getElementById('photo-gallery'); const vg = document.getElementById('video-gallery');
                pg.innerHTML = ""; vg.innerHTML = "";
                if(s.val()) Object.values(s.val()).forEach(p => {
                    if(p.type === 'vid') vg.innerHTML += `<video src="${p.url}" controls></video>`;
                    else pg.innerHTML += `<img src="${p.url}" onclick="openImg('${p.url}')">`;
                });
            });
        }

        function loadManagement() {
            const container = document.getElementById('manage-list'); container.innerHTML = "";
            ['photos', 'messages'].forEach(type => {
                db.ref(type).once('value', s => {
                    if(s.val()) Object.entries(s.val()).forEach(([key, val]) => {
                        const item = document.createElement('div');
                        item.className = 'manage-item';
                        let preview = type === 'photos' ? (val.type === 'vid' ? '📽️ فيديو' : `<img src="${val.url}">`) : `📝 ${val.text.substring(0,10)}..`;
                        item.innerHTML = `<span>${preview}</span> <button class="del-btn" onclick="deleteItem('${type}','${key}')">حذف</button>`;
                        container.appendChild(item);
                    });
                });
            });
        }

        async function deleteItem(t, k) { if(confirm("حذف؟")) { await db.ref(`${t}/${k}`).remove(); loadManagement(); } }

        function startLiveCounter() {
            setInterval(() => {
                const startDate = new Date(settings.date + " 00:00:00");
                const now = new Date();
                let diff = now - startDate;
                let years = now.getFullYear() - startDate.getFullYear();
                let months = now.getMonth() - startDate.getMonth();
                let days = now.getDate() - startDate.getDate();
                if (days < 0) { months--; let lastMonth = new Date(now.getFullYear(), now.getMonth(), 0); days += lastMonth.getDate(); }
                if (months < 0) { years--; months += 12; }
                const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24), mins = Math.floor((diff / (1000 * 60)) % 60), secs = Math.floor((diff / 1000) % 60);
                document.getElementById('live-timer').innerHTML = `
                    <div class="counter-unit"><span class="unit-num">${years}</span><span class="unit-label">سنة</span></div>
                    <div class="counter-unit"><span class="unit-num">${months}</span><span class="unit-label">شهر</span></div>
                    <div class="counter-unit"><span class="unit-num">${days}</span><span class="unit-label">يوم</span></div>
                    <div class="counter-unit"><span class="unit-num">${hrs}</span><span class="unit-label">ساعة</span></div>
                    <div class="counter-unit"><span class="unit-num">${mins}</span><span class="unit-label">دقيقة</span></div>
                    <div class="counter-unit"><span class="unit-num">${secs}</span><span class="unit-label">ثانية</span></div>`;
            }, 1000);
        }
    </script>
</body>
</html>
