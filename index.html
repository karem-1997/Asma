<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم أسماء الخاص ✨</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@300;400;600;700&family=Great+Vibes&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gold: #ffb703; --gold-light: #ffca3a; --gold-dark: #e6a502;
            --rose: #ff6b9d; --rose-light: #ff8fab; --rose-dark: #c9184a;
            --purple: #b5179e; --glass: rgba(0,0,0,0.4); --glass-border: rgba(255,255,255,0.1);
            --danger: #ff4d6d; --success: #2ecc71; --radius: 20px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden; line-height: 1.6; }

        /* ======== PARTICLES ======== */
        #particles-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* ======== FLOATING HEARTS ======== */
        .heart { position: fixed; pointer-events: none; z-index: 1; opacity: 0.6; animation: floatHeart linear infinite; }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; } 90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* ======== BACKGROUND ======== */
        .bg-layer { position: fixed; inset: 0; z-index: -2; background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 1.5s ease; }
        .bg-overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(180deg, rgba(10,0,20,0.4) 0%, rgba(0,0,0,0.7) 50%, rgba(20,0,10,0.5) 100%); backdrop-filter: blur(2px); }

        /* ======== AURORA ======== */
        .aurora { position: fixed; inset: 0; z-index: -1; background: radial-gradient(ellipse at 20% 50%, rgba(181,23,158,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(255,183,3,0.08) 0%, transparent 50%); animation: auroraShift 15s ease-in-out infinite alternate; pointer-events: none; }
        @keyframes auroraShift { 0% { transform: translateX(-5%) translateY(-3%) scale(1.1); } 50% { transform: translateX(3%) translateY(2%) scale(1); } 100% { transform: translateX(-2%) translateY(-5%) scale(1.15); } }

        /* ======== GATE ======== */
        .gate { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background-size: cover; background-position: center; transition: opacity 1s ease, visibility 1s ease; }
        .gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .gate-card { background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(20,0,20,0.5)); backdrop-filter: blur(25px); padding: 50px 35px; border-radius: var(--radius); border: 1px solid rgba(255,183,3,0.2); width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,183,3,0.1), inset 0 1px 0 rgba(255,255,255,0.1); animation: floatIn 0.8s ease-out, cardGlow 4s ease-in-out infinite alternate; position: relative; overflow: hidden; }
        .gate-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent, rgba(255,183,3,0.1), transparent 30%); animation: rotateBorder 8s linear infinite; }
        .gate-card::after { content: ''; position: absolute; inset: 2px; background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,0,20,0.6)); border-radius: calc(var(--radius) - 2px); z-index: 0; }
        .gate-card > * { position: relative; z-index: 1; }
        @keyframes rotateBorder { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes cardGlow { from { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,183,3,0.1); } to { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 60px rgba(255,107,157,0.15); } }
        @keyframes floatIn { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .gate-title { font-family: 'Amiri', serif; font-size: 3rem; background: linear-gradient(135deg, var(--gold), var(--rose-light), var(--gold)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 5s ease infinite; margin-bottom: 10px; }
        @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .gate-subtitle { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 16px 20px; border: 2px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(0,0,0,0.4); color: #fff; font-family: inherit; font-size: 1.05rem; text-align: center; transition: all 0.4s ease; }
        .input-group input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(255,183,3,0.2), inset 0 0 20px rgba(255,183,3,0.05); }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-family: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); display: inline-flex; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.6s; }
        .btn:hover::before { left: 100%; }
        .btn-primary { background: linear-gradient(135deg, var(--gold), var(--rose), var(--gold)); background-size: 200% 200%; color: #000; animation: gradientShift 4s ease infinite; box-shadow: 0 8px 25px rgba(255,183,3,0.3); }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(255,183,3,0.4), 0 0 30px rgba(255,107,157,0.2); }
        .btn-primary:active { transform: translateY(0) scale(0.98); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,183,3,0.3); }
        .btn-danger { background: linear-gradient(135deg, #ff4d6d, #c9184a); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }

        .trigger-link { display: block; margin-top: 25px; color: rgba(255,255,255,0.25); font-size: 0.8rem; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
        .trigger-link:hover { color: var(--gold); text-shadow: 0 0 10px rgba(255,183,3,0.3); }

        /* ======== CONTENT ======== */
        .content { display: none; opacity: 0; padding: 20px; max-width: 900px; margin: 0 auto; transition: opacity 1.2s ease; }
        .content.visible { display: block; opacity: 1; animation: contentReveal 1s ease-out; }
        @keyframes contentReveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* ======== HERO ======== */
        .hero { text-align: center; padding: 80px 20px 40px; position: relative; }
        .hero::before { content: '❤'; position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: var(--rose); animation: heartbeat 1.5s ease-in-out infinite; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
        @keyframes heartbeat { 0%,100% { transform: translateX(-50%) scale(1); } 14% { transform: translateX(-50%) scale(1.3); } 28% { transform: translateX(-50%) scale(1); } 42% { transform: translateX(-50%) scale(1.3); } 70% { transform: translateX(-50%) scale(1); } }

        .hero-title { font-family: 'Amiri', serif; font-size: clamp(2.5rem, 6vw, 4rem); background: linear-gradient(135deg, var(--gold), var(--rose-light), var(--gold)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 5s ease infinite; margin-bottom: 15px; position: relative; }
        .hero-title::after { content: '✨'; position: absolute; right: -40px; top: 0; animation: sparkleFloat 3s ease-in-out infinite; }
        @keyframes sparkleFloat { 0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.7; } 50% { transform: translateY(-15px) rotate(180deg); opacity: 1; } }

        .hero-intro { font-size: 1.2rem; color: rgba(255,255,255,0.7); font-weight: 300; letter-spacing: 1px; font-family: 'Great Vibes', cursive; font-size: 1.8rem; }

        /* ======== CARDS ======== */
        .card { background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(20,0,20,0.3)); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 25px; margin: 25px auto; box-shadow: var(--shadow), 0 0 30px rgba(255,183,3,0.05); transition: all 0.4s ease; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--rose), var(--purple), var(--gold)); background-size: 300% 100%; animation: borderFlow 3s linear infinite; }
        @keyframes borderFlow { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px rgba(255,183,3,0.1); }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; color: var(--gold); font-weight: 700; font-size: 1.15rem; }
        .card-header i { font-size: 1.3rem; animation: iconPulse 2s ease-in-out infinite; }
        @keyframes iconPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* ======== TIMER ======== */
        .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (min-width: 600px) { .timer-grid { grid-template-columns: repeat(6, 1fr); } }

        .timer-unit { background: linear-gradient(135deg, rgba(255,183,3,0.08), rgba(255,107,157,0.05)); border: 1px solid rgba(255,183,3,0.15); border-radius: 16px; padding: 16px 10px; text-align: center; transition: all 0.4s ease; position: relative; overflow: hidden; }
        .timer-unit::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(255,183,3,0.1), transparent 70%); opacity: 0; transition: opacity 0.3s; }
        .timer-unit:hover::before { opacity: 1; }
        .timer-unit:hover { transform: translateY(-5px); border-color: rgba(255,183,3,0.3); }
        .timer-num { display: block; font-size: 1.6rem; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; text-shadow: 0 0 15px rgba(255,183,3,0.3); transition: all 0.3s ease; }
        .timer-unit:hover .timer-num { transform: scale(1.1); }
        .timer-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

        /* ======== LOVE METER ======== */
        .love-meter { margin-top: 15px; padding: 15px; background: rgba(255,107,157,0.05); border-radius: 14px; border: 1px solid rgba(255,107,157,0.1); }
        .love-meter-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .love-meter-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 4px; animation: lovePulse 2s ease-in-out infinite; box-shadow: 0 0 10px rgba(255,107,157,0.3); }
        @keyframes lovePulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 20px rgba(255,107,157,0.5); } }
        .love-meter-text { font-size: 0.8rem; color: var(--rose-light); text-align: center; margin-top: 8px; }

        /* ======== GALLERY ======== */
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 600px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        #videoGallery { grid-template-columns: 1fr; }
        @media (min-width: 600px) { #videoGallery { grid-template-columns: repeat(2, 1fr); } }

        .gallery-item { position: relative; border-radius: 18px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); transition: all 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .gallery-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6) 100%); opacity: 0; transition: opacity 0.3s; }
        .gallery-item:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,183,3,0.1); border-color: rgba(255,183,3,0.2); }
        .gallery-item:hover::after { opacity: 1; }
        .gallery-item img, .gallery-item video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
        .gallery-item:hover img, .gallery-item:hover video { transform: scale(1.15); }
        .video-card {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background: #000;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 25px rgba(255,183,3,0.1);
            border-color: rgba(255,183,3,0.2);
        }
        .video-card video {
            width: 100%;
            height: auto;
            max-height: 280px;
            display: block;
            border-radius: 18px;
        }
        .video-card video::-webkit-media-controls {
            background: rgba(0,0,0,0.5);
        }

        /* ======== MESSAGES ======== */
        .message-list { display: flex; flex-direction: column; gap: 15px; }
        .message-item { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(20,0,20,0.2)); backdrop-filter: blur(15px); padding: 20px 24px; border-radius: 18px; border-right: 4px solid var(--gold); text-align: right; position: relative; animation: slideIn 0.6s ease-out; transition: all 0.4s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .message-item:hover { transform: translateX(-8px); border-right-color: var(--rose); box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 20px rgba(255,183,3,0.05); }
        .message-item::before { content: '"'; position: absolute; top: 5px; right: 15px; font-family: 'Amiri', serif; font-size: 3rem; color: rgba(255,183,3,0.1); line-height: 1; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .message-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 10px; display: block; }

        /* ======== LIGHTBOX ======== */
        .lightbox { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; backdrop-filter: blur(10px); }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 16px; border: 2px solid var(--gold); box-shadow: 0 0 60px rgba(255,183,3,0.2), 0 20px 60px rgba(0,0,0,0.5); transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
        .lightbox.active img { transform: scale(1); }
        .lightbox-close { position: absolute; top: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--gold); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.4s ease; backdrop-filter: blur(10px); }
        .lightbox-close:hover { background: rgba(255,183,3,0.2); transform: rotate(90deg) scale(1.1); border-color: var(--gold); }

        /* ======== MUSIC BUTTON ======== */
        .music-btn { position: fixed; top: 25px; left: 25px; width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--rose)); color: #000; border: none; cursor: pointer; z-index: 5000; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 4px 20px rgba(255,183,3,0.4), 0 0 30px rgba(255,107,157,0.2); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); animation: musicPulse 2s infinite; }
        @keyframes musicPulse { 0%,100% { box-shadow: 0 4px 20px rgba(255,183,3,0.4), 0 0 30px rgba(255,107,157,0.2); } 50% { box-shadow: 0 4px 30px rgba(255,183,3,0.6), 0 0 50px rgba(255,107,157,0.3); } }
        .music-btn:hover { transform: scale(1.15) rotate(15deg); }
        .music-btn.playing { animation: spin 6s linear infinite, musicPulse 2s infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ======== ADMIN ======== */
        .admin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.4s ease; }
        .admin-overlay.active { display: flex; opacity: 1; }
        .admin-panel { background: linear-gradient(135deg, rgba(10,10,10,0.98), rgba(20,0,20,0.95)); border: 1px solid rgba(255,183,3,0.2); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 30px; transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,183,3,0.1); }
        .admin-overlay.active .admin-panel { transform: translateY(0) scale(1); }
        .admin-title { text-align: center; background: linear-gradient(135deg, var(--gold), var(--rose-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 1.8rem; margin-bottom: 25px; font-family: 'Amiri', serif; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7); font-size: 0.9rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.5); color: #fff; font-family: inherit; font-size: 0.95rem; transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 15px rgba(255,183,3,0.1); }
        .form-group input[type="file"] { padding: 10px; cursor: pointer; }
        .form-group input[type="file"]::file-selector-button { background: linear-gradient(135deg, var(--gold), var(--rose)); color: #000; border: none; padding: 8px 18px; border-radius: 8px; font-family: inherit; font-weight: 700; cursor: pointer; margin-left: 10px; transition: all 0.3s; }

        .section-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), var(--rose), transparent); margin: 30px 0; opacity: 0.4; }
        .manage-list { max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .manage-list::-webkit-scrollbar { width: 4px; }
        .manage-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
        .manage-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .manage-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,183,3,0.1); }
        .manage-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .manage-item-info { flex: 1; margin: 0 12px; font-size: 0.85rem; color: rgba(255,255,255,0.7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-sm { padding: 8px 14px; font-size: 0.85rem; border-radius: 10px; }

        /* ======== TOAST ======== */
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(20,0,20,0.8)); backdrop-filter: blur(20px); border: 1px solid var(--gold); color: #fff; padding: 16px 32px; border-radius: 16px; z-index: 20000; font-weight: 700; opacity: 0; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,183,3,0.1); display: flex; align-items: center; gap: 10px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ======== EMPTY STATE ======== */
        .empty-state { text-align: center; padding: 50px 20px; color: rgba(255,255,255,0.3); font-size: 0.95rem; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; color: rgba(255,255,255,0.15); display: block; }
        .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* ======== SCROLLBAR ======== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold), var(--rose)); border-radius: 3px; }

        /* ======== FLOATING TEXT ======== */
        .floating-text { position: fixed; bottom: 20px; right: 20px; font-family: 'Great Vibes', cursive; font-size: 1.2rem; color: rgba(255,183,3,0.3); pointer-events: none; animation: floatText 8s ease-in-out infinite; z-index: 1; }
        @keyframes floatText { 0%,100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.6; } }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>
    <div class="aurora"></div>
    <div class="bg-layer" id="bgLayer"></div>
    <div class="bg-overlay"></div>
    <div class="floating-text">Forever & Always</div>

    <!-- Gate -->
    <div class="gate" id="gate">
        <div class="gate-card">
            <h1 class="gate-title">أسماء</h1>
            <p class="gate-subtitle">عالم الحب والجمال</p>
            <div class="input-group"><input type="password" id="gatePass" placeholder="كلمة السر" autocomplete="off"></div>
            <button class="btn btn-primary" onclick="unlock()"><i class="fas fa-heart"></i> دخول إلى عالمكِ</button>
            <span class="trigger-link" onclick="openAdmin()" style="font-size:1.2rem;opacity:0.4;">❤️</span>
        </div>
    </div>

    <button class="music-btn" id="mBtn" onclick="toggleMusic()"><i class="fas fa-music"></i></button>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fas fa-times"></i></button>
        <img id="lightImg" src="" alt="صورة مكبرة">
    </div>

    <div class="content" id="content">
        <audio id="bgMusic" loop preload="auto"></audio>
        <section class="hero">
            <h1 class="hero-title" id="welcomeTitle">عالم أسماء الخاص</h1>
            <p class="hero-intro" id="welcomeIntro">أنتِ كل حياتي</p>
        </section>

        <div class="card">
            <div class="card-header"><i class="fas fa-hourglass-half"></i><span>بداية الرحلة</span></div>
            <div class="timer-grid" id="liveTimer">
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">سنة</span></div>
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">شهر</span></div>
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">يوم</span></div>
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">ساعة</span></div>
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">دقيقة</span></div>
                <div class="timer-unit"><span class="timer-num">0</span><span class="timer-label">ثانية</span></div>
            </div>
            <div class="love-meter">
                <div style="font-size:0.85rem;color:var(--rose-light);text-align:center;"><i class="fas fa-heart" style="color:var(--rose);"></i> مؤشر الحب</div>
                <div class="love-meter-bar"><div class="love-meter-fill"></div></div>
                <div class="love-meter-text">100% - إلى الأبد</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-images"></i><span>عالمكِ الخاص</span></div>
            <div class="gallery" id="photoGallery"><div class="empty-state"><i class="fas fa-images"></i>لا توجد صور بعد</div></div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-film"></i><span>لحظات لا تُنسى</span></div>
            <div class="gallery" id="videoGallery"><div class="empty-state"><i class="fas fa-film"></i>لا توجد فيديوهات بعد</div></div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-envelope-open-text"></i><span>رسائل لكِ</span></div>
            <div class="message-list" id="messagesList"><div class="empty-state"><i class="fas fa-envelope"></i>لا توجد رسائل بعد</div></div>
        </div>
        <div style="height: 60px;"></div>
    </div>

    <div class="admin-overlay" id="adminOverlay" onclick="closeAdminOnOverlay(event)">
        <div class="admin-panel" onclick="event.stopPropagation()">
            <h2 class="admin-title">إدارة المحتوى</h2>
            <div class="form-group"><label>العنوان</label><input type="text" id="confTitle" placeholder="عنوان الموقع"></div>
            <div class="form-group"><label>رسالة الترحيب</label><input type="text" id="confIntro" placeholder="أنتِ كل حياتي"></div>
            <div class="form-group"><label>كلمة السر</label><input type="text" id="confPass" placeholder="باسورد الدخول"></div>
            <div class="form-group"><label>تاريخ البداية</label><input type="date" id="confDate"></div>
            <div class="form-group"><label>خلفية الموقع</label><input type="file" id="bgFile" accept="image/*"></div>
            <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> حفظ الإعدادات</button>

            <div class="section-divider"></div>

            <div class="form-group"><label>إضافة صورة</label><input type="file" id="photoFile" accept="image/*"></div>
            <div class="form-group"><label>إضافة فيديو</label><input type="file" id="videoFile" accept="video/*"></div>
            <div class="form-group"><label>إضافة موسيقى</label><input type="file" id="musicFile" accept="audio/*"></div>
            <div class="form-group"><label>رسالة جديدة</label><textarea id="msgInp" rows="3" placeholder="اكتب رسالة جميلة..."></textarea></div>
            <button class="btn btn-success" onclick="uploadContent()" id="upBtn"><i class="fas fa-cloud-upload-alt"></i> رفع المحتوى</button>

            <div class="section-divider"></div>
            <h4 style="color:var(--gold);margin-bottom:15px;text-align:center;"><i class="fas fa-trash-alt"></i> إدارة المحتوى</h4>
            <div class="manage-list" id="manageList"><div class="empty-state" style="padding:20px"><i class="fas fa-folder-open"></i>لا يوجد محتوى</div></div>

            <div class="section-divider"></div>
            <button class="btn btn-secondary" onclick="closeAdmin()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKBX6VE8UWECLNZXZV2-AdfXMQsTqck_I",
            authDomain: "asma-7459e.firebaseapp.com",
            projectId: "asma-7459e",
            storageBucket: "asma-7459e.firebasestorage.app",
            messagingSenderId: "827126235820",
            appId: "1:827126235820:web:ea0f8bf2531ad01e361509",
            measurementId: "G-8X7J63QPLR",
            databaseURL: "https://asma-7459e-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const state = { settings: { title: "أسماء", intro: "أنتِ كل حياتي", date: "2026-01-01", pass: "123" }, timerInterval: null, isAdminOpen: false };
        const $ = (id) => document.getElementById(id);
        const elements = {
            gate: $('gate'), content: $('content'), gatePass: $('gatePass'),
            welcomeTitle: $('welcomeTitle'), welcomeIntro: $('welcomeIntro'),
            bgLayer: $('bgLayer'), bgMusic: $('bgMusic'), mBtn: $('mBtn'),
            lightbox: $('lightbox'), lightImg: $('lightImg'),
            photoGallery: $('photoGallery'), videoGallery: $('videoGallery'),
            messagesList: $('messagesList'), liveTimer: $('liveTimer'),
            adminOverlay: $('adminOverlay'), manageList: $('manageList'),
            confTitle: $('confTitle'), confIntro: $('confIntro'),
            confPass: $('confPass'), confDate: $('confDate'),
            upBtn: $('upBtn'), toast: $('toast')
        };

        // ======== PARTICLES ========
        function initParticles() {
            const canvas = $('particles-canvas');
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            const particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.2, color: Math.random() > 0.5 ? '255,183,3' : '255,107,157'
                });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.opacity * 0.1})`; ctx.fill();
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255,183,3,${0.1 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // ======== FLOATING HEARTS ========
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤','💕','💖','💗','💝','💘'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 6 + 8) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.opacity = Math.random() * 0.4 + 0.2;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 14000);
        }
        function startHearts() { setInterval(createHeart, 2000); }

        // ======== FIREBASE LISTENERS ========
        db.ref('appSettings').on('value', snap => {
            if (!snap.exists()) return;
            state.settings = snap.val();
            elements.welcomeTitle.textContent = state.settings.title || "أسماء";
            elements.welcomeIntro.textContent = state.settings.intro || "أنتِ كل حياتي";
            elements.confTitle.value = state.settings.title || "";
            elements.confIntro.value = state.settings.intro || "";
            elements.confPass.value = state.settings.pass || "";
            elements.confDate.value = state.settings.date || "";
        });
        db.ref('visuals/bg').on('value', snap => {
            if (snap.exists()) { elements.bgLayer.style.backgroundImage = `url(${snap.val()})`; $('gate').style.backgroundImage = `url(${snap.val()})`; }
        });
        db.ref('visuals/music').on('value', snap => { if (snap.exists()) elements.bgMusic.src = snap.val(); });

        // ======== CORE FUNCTIONS ========
        function unlock() {
            if (elements.gatePass.value !== state.settings.pass) {
                showToast("كلمة السر غير صحيحة", "error");
                elements.gatePass.style.borderColor = "var(--danger)";
                setTimeout(() => elements.gatePass.style.borderColor = "", 1000);
                return;
            }
            elements.gate.classList.add('hidden');
            elements.content.classList.add('visible');
            elements.bgMusic.play().catch(() => {});
            startLiveCounter(); loadData(); startHearts();
            showToast("أهلاً بيكِ في عالمكِ الخاص يا أسماء");
        }

        function openAdmin() {
            const pass = prompt("باسورد الإدارة:");
            if (pass !== "1997") { if (pass) showToast("باسورد غير صحيح", "error"); return; }
            elements.adminOverlay.classList.add('active');
            state.isAdminOpen = true; loadManagement();
        }
        function closeAdmin() { elements.adminOverlay.classList.remove('active'); state.isAdminOpen = false; }
        function closeAdminOnOverlay(e) { if (e.target === elements.adminOverlay) closeAdmin(); }

        function openImg(url) { elements.lightImg.src = url; elements.lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeLightbox(e) {
            if (e && e.target !== e.currentTarget && !e.target.closest('.lightbox-close')) return;
            elements.lightbox.classList.remove('active'); document.body.style.overflow = '';
            setTimeout(() => elements.lightImg.src = "", 300);
        }

        function toggleMusic() {
            const audio = elements.bgMusic, btn = elements.mBtn;
            if (audio.paused) { audio.play(); btn.classList.add('playing'); btn.innerHTML = '<i class="fas fa-pause"></i>'; showToast("الموسيقى شغالة"); }
            else { audio.pause(); btn.classList.remove('playing'); btn.innerHTML = '<i class="fas fa-music"></i>'; showToast("الموسيقى متوقفة"); }
        }

        // ======== SETTINGS ========
        async function saveSettings() {
            const bgFile = $('bgFile').files[0];
            const updates = { title: elements.confTitle.value, intro: elements.confIntro.value, pass: elements.confPass.value, date: elements.confDate.value };
            try {
                await db.ref('appSettings').update(updates);
                if (bgFile) { const dataUrl = await readFile(bgFile); await db.ref('visuals/bg').set(dataUrl); }
                showToast("تم حفظ الإعدادات بنجاح");
            } catch (err) { showToast("حدث خطأ: " + err.message, "error"); }
        }

        // ======== UPLOAD ========
        async function uploadContent() {
            const btn = elements.upBtn, originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<span class="loader"></span> جاري الرفع...';
            try {
                const files = { music: $('musicFile').files[0], photo: $('photoFile').files[0], video: $('videoFile').files[0] };
                const msg = $('msgInp').value.trim();
                const tasks = [];
                if (msg) { tasks.push(db.ref('messages').push({ text: msg, timestamp: Date.now() })); $('msgInp').value = ""; }
                if (files.music) tasks.push(readFile(files.music).then(url => db.ref('visuals/music').set(url)));
                if (files.photo) tasks.push(readFile(files.photo).then(url => db.ref('photos').push({ url, type: 'img', timestamp: Date.now() })));
                if (files.video) tasks.push(readFile(files.video).then(url => db.ref('photos').push({ url, type: 'vid', timestamp: Date.now() })));
                await Promise.all(tasks);
                $('photoFile').value = ""; $('videoFile').value = ""; $('musicFile').value = "";
                showToast("تم الرفع بنجاح"); loadManagement();
            } catch (err) { showToast("فشل الرفع: " + err.message, "error"); }
            finally { btn.disabled = false; btn.innerHTML = originalText; }
        }

        // ======== DATA LOADING ========
        function loadData() {
            db.ref('messages').on('value', snap => {
                const container = elements.messagesList;
                if (!snap.exists()) { container.innerHTML = '<div class="empty-state"><i class="fas fa-envelope"></i>لا توجد رسائل بعد</div>'; return; }
                const messages = Object.entries(snap.val()).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
                container.innerHTML = messages.map(([key, msg]) => `<div class="message-item">${escapeHtml(msg.text)}${msg.timestamp ? `<span class="message-time">${formatDate(msg.timestamp)}</span>` : ''}</div>`).join('');
            });
            db.ref('photos').on('value', snap => {
                const pc = elements.photoGallery, vc = elements.videoGallery;
                if (!snap.exists()) {
                    pc.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i>لا توجد صور بعد</div>';
                    vc.innerHTML = '<div class="empty-state"><i class="fas fa-film"></i>لا توجد فيديوهات بعد</div>';
                    return;
                }
                const items = Object.values(snap.val()), photos = items.filter(p => p.type !== 'vid'), videos = items.filter(p => p.type === 'vid');
                pc.innerHTML = photos.length ? photos.map(p => `<div class="gallery-item" onclick="openImg('${escapeHtml(p.url)}')"><img src="${escapeHtml(p.url)}" loading="lazy" alt="صورة"></div>`).join('') : '<div class="empty-state"><i class="fas fa-images"></i>لا توجد صور بعد</div>';
                vc.innerHTML = videos.length ? videos.map(p => `<div class="video-card"><video src="${escapeHtml(p.url)}" controls preload="metadata" playsinline muted></video></div>`).join('') : '<div class="empty-state"><i class="fas fa-film"></i>لا توجد فيديوهات بعد</div>';
            });
        }

        // ======== MANAGEMENT ========
        function loadManagement() {
            const container = elements.manageList;
            container.innerHTML = '<div class="empty-state" style="padding:20px"><span class="loader"></span><br>جاري التحميل...</div>';
            Promise.all([db.ref('photos').once('value'), db.ref('messages').once('value')]).then(([photosSnap, messagesSnap]) => {
                container.innerHTML = '';
                if (photosSnap.exists()) Object.entries(photosSnap.val()).forEach(([key, val]) => container.appendChild(createManageItem(val.type === 'vid' ? '📽️ فيديو' : `<img src="${val.url}" alt="">`, val.type === 'vid' ? 'فيديو' : 'صورة', () => deleteItem('photos', key))));
                if (messagesSnap.exists()) Object.entries(messagesSnap.val()).forEach(([key, val]) => container.appendChild(createManageItem(`📝 ${val.text.substring(0,25)}${val.text.length>25?'...':''}`, 'رسالة', () => deleteItem('messages', key))));
                if (!container.children.length) container.innerHTML = '<div class="empty-state" style="padding:20px"><i class="fas fa-folder-open"></i>لا يوجد محتوى</div>';
            });
        }

        function createManageItem(preview, label, onDelete) {
            const div = document.createElement('div'); div.className = 'manage-item';
            div.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><div style="width:50px;height:50px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;">${preview}</div><span style="font-size:0.8rem;color:#888;">${label}</span></div><button class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>`;
            div.querySelector('button').onclick = async function() { if (!confirm('هل أنت متأكد من الحذف؟')) return; this.innerHTML = '<span class="loader"></span>'; await onDelete(); };
            return div;
        }

        async function deleteItem(type, key) {
            try { await db.ref(`${type}/${key}`).remove(); showToast("تم الحذف"); loadManagement(); }
            catch (err) { showToast("فشل الحذف", "error"); }
        }

        // ======== TIMER ========
        function startLiveCounter() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            const updateTimer = () => {
                const startDate = new Date(state.settings.date + "T00:00:00"), now = new Date();
                if (isNaN(startDate.getTime())) return;
                let years = now.getFullYear() - startDate.getFullYear(), months = now.getMonth() - startDate.getMonth(), days = now.getDate() - startDate.getDate();
                if (days < 0) { months--; const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0); days += lastMonth.getDate(); }
                if (months < 0) { years--; months += 12; }
                const diff = now - startDate, hrs = Math.floor((diff / 3600000) % 24), mins = Math.floor((diff / 60000) % 60), secs = Math.floor((diff / 1000) % 60);
                const values = [years, months, days, hrs, mins, secs];
                const nums = elements.liveTimer.querySelectorAll('.timer-num');
                nums.forEach((el, i) => {
                    if (el.textContent !== String(values[i])) {
                        el.textContent = values[i]; el.parentElement.style.transform = 'scale(1.15)';
                        setTimeout(() => el.parentElement.style.transform = '', 200);
                    }
                });
            };
            updateTimer(); state.timerInterval = setInterval(updateTimer, 1000);
        }

        // ======== UTILITIES ========
        function readFile(file) { return new Promise((resolve, reject) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file); }); }
        function showToast(msg, type = "success") { const t = elements.toast; t.textContent = msg; t.style.borderColor = type === "error" ? "var(--danger)" : "var(--gold)"; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatDate(ts) { return new Date(ts).toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }

        // ======== KEYBOARD ========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { if (elements.lightbox.classList.contains('active')) closeLightbox(); if (state.isAdminOpen) closeAdmin(); }
            if (e.key === 'Enter' && !state.isAdminOpen && !elements.gate.classList.contains('hidden')) unlock();
        });
        elements.gatePass.addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });
        document.addEventListener('contextmenu', (e) => { if (e.target.tagName === 'IMG') e.preventDefault(); });

        // ======== INIT ========
        initParticles();
    </script>
</body>
</html>
